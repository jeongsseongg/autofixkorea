function seededShuffle(arr,seed){
  var a=arr.slice(),s=seed;
  for(var i=a.length-1;i>0;i--){s=lcg(s);var j=s%(i+1);var t=a[i];a[i]=a[j];a[j]=t;}

}
function dDate(n){
  var d=new Date();d.setDate(d.getDate()-n);

}

}

   tx:'앞쪽 모서리와 라이트 부분이 파손된 경차였습니다. 작은 차라도 사고 부위를 제대로 보고 매입해 줘서 만족했습니다.'},
  {n:'류**',r:'경기 일산',v:'대형 SUV',t:'전면파손',dA:19,p:4,star:4.6,img:'review-26.jpg',
   tx:'전면 좌측 파손이 크고 휠 주변까지 손상된 차량이었습니다. 사진을 보낸 뒤 견적과 일정 안내가 빨랐습니다.'},
  {n:'배**',r:'서울 강서',v:'검정 세단',t:'전손차량',dA:27,p:2,star:4.6,img:'review-27.jpg',
   tx:'도로 사고로 전면부가 크게 파손돼 현장에서 바로 처리 방향이 필요했습니다. 상담 후 견인과 매입이 순서대로 진행됐습니다.'},
  {n:'최**',r:'부산 사상',v:'벨로스터 N',t:'사고차매입',dA:1,p:3,star:4.5,img:'review-28.jpg',
   tx:'앞범퍼와 측면 스크래치가 함께 있는 차량이었습니다. 튜닝 차량이라 걱정했는데 상태를 보고 적정 금액을 받았습니다.'},
  {n:'노**',r:'경기 수원',v:'흰색 전기차',t:'전면파손',dA:31,p:4,star:4.5,img:'review-29.jpg',
   tx:'전기차 전면부와 휠 쪽 손상이 있어 일반 매매가 어려웠습니다. 사고 부위를 기준으로 빠르게 매입가를 받았습니다.'},
  {n:'도**',r:'서울 중랑',v:'레인지로버 이보크',t:'고장차매입',dA:6,p:2,star:4.4,img:'review-30.jpg',
   tx:'외관보다 고장 증상이 문제였던 차량입니다. 운행이 부담스러웠는데 고장차 기준으로 상담하고 바로 매각했습니다.'}
];

var shuffled=seededShuffle(BASE,dateSeed());
var DATA=shuffled.slice().sort(function(a,b){return a.dA-b.dA;});
var N=DATA.length;
var CLONE=5;
var GAP=4;

var track=document.getElementById('rv6Track');
var fill=document.getElementById('rv6Fill');
var curEl=document.getElementById('rv6Cur');
var totEl=document.getElementById('rv6Tot');
totEl.textContent=N;

function cardWidth(){
  var vw=window.innerWidth;
  if(vw<=520) return Math.floor(vw*0.72);
  if(vw<=860) return Math.floor(vw*0.36);
  return Math.min(260,Math.floor(vw/5.2));
}
function mkCard(r){
  var p=PAL[r.p%PAL.length];
  var imgUrl=r.img.indexOf('http')===0?r.img:IMG_BASE+r.img;
  var bg=r.img
    ?'background-image:url(\''+imgUrl+'\');background-color:#111;'
    :'background:'+(BG[r.t]||BG['사고차매입'])+';';
  var bgCls='rv6-bg'+(r.img?' img':'');
  var el=document.createElement('div');
  el.className='rv6-card';
  el.style.width=cardWidth()+'px';
  el.innerHTML=
    '<div class="'+bgCls+'" style="'+bg+'"></div>'+
    '<div class="rv6-grad"></div>'+
    '<div class="rv6-badges">'+
      '<span class="rv6-tbadge">'+r.t+'</span>'+
      (r.dA<=3?'<span class="rv6-nbadge">NEW</span>':'')+
    '</div>'+
    '<div class="rv6-body">'+
      '<div class="rv6-stars">'+starHtml(r.star)+'</div>'+
      '<div class="rv6-txt">'+r.tx+'</div>'+
      '<div class="rv6-meta">'+
        '<div class="rv6-who">'+
          '<div class="rv6-av" style="background:'+p.bg+'"><span style="color:'+p.c+'">'+r.n.charAt(0)+'</span></div>'+
          '<div><div class="rv6-nm">'+r.n+'</div><div class="rv6-rg">'+r.r+'</div></div>'+
        '</div>'+
        '<div><div class="rv6-veh">'+r.v+'</div><div class="rv6-dt">'+dDate(r.dA)+'</div></div>'+
      '</div>'+
    '</div>';
  return el;
}
function buildTrack(){
  track.innerHTML='';
  for(var i=N-CLONE;i<N;i++) track.appendChild(mkCard(DATA[i]));
  for(var j=0;j<N;j++) track.appendChild(mkCard(DATA[j]));
  for(var k=0;k<CLONE;k++) track.appendChild(mkCard(DATA[k]));
}
buildTrack();

function stride(){return cardWidth()+GAP;}
function idxOffset(logicIdx){return (CLONE+logicIdx)*stride();}

var cur=0, pxNow=0, dragging=false, dxS=0, pxS=0, timer=null;
function move(px,anim){
  pxNow=px;
  track.style.transition=anim?'transform .62s cubic-bezier(.22,.61,.36,1)':'none';
  track.style.transform='translateX(-'+px+'px)';
}
function goTo(idx,anim){
  cur=((idx%N)+N)%N;
  move(idxOffset(cur),anim!==false);
  fill.style.width=(N>1?(cur/(N-1))*100:100)+'%';
  curEl.textContent=cur+1;
}
track.addEventListener('transitionend',function(){
  var expected=idxOffset(cur);
  if(Math.abs(pxNow-expected)>1) move(expected,false);
});

function dStart(x){clearInterval(timer);dragging=true;dxS=x;pxS=pxNow;track.classList.add('grab');track.style.transition='none';}
function dMove(x){if(!dragging)return;move(pxS-(x-dxS),false);}
function dEnd(x){
  if(!dragging)return;dragging=false;track.classList.remove('grab');
  var dx=x-dxS;
  if(Math.abs(dx)>44) goTo(dx<0?cur+1:cur-1,true);
  else goTo(cur,true);
  resetTimer();
}
track.addEventListener('mousedown',function(e){dStart(e.clientX);});
window.addEventListener('mousemove',function(e){dMove(e.clientX);});
window.addEventListener('mouseup',function(e){dEnd(e.clientX);});
track.addEventListener('touchstart',function(e){dStart(e.touches[0].clientX);},{passive:true});
track.addEventListener('touchmove',function(e){dMove(e.touches[0].clientX);},{passive:true});
track.addEventListener('touchend',function(e){dEnd(e.changedTouches[0].clientX);},{passive:true});

document.getElementById('rv6Prev').addEventListener('click',function(){clearInterval(timer);goTo(cur-1,true);resetTimer();});
document.getElementById('rv6Next').addEventListener('click',function(){clearInterval(timer);goTo(cur+1,true);resetTimer();});

function resetTimer(){clearInterval(timer);timer=setInterval(function(){goTo(cur+1,true);},3200);}
document.addEventListener('visibilitychange',function(){clearInterval(timer);if(!document.hidden)resetTimer();});

var resizeT;
window.addEventListener('resize',function(){
  clearTimeout(resizeT);
  resizeT=setTimeout(function(){buildTrack();goTo(cur,false);},120);
});

function init(){
  requestAnimationFrame(function(){requestAnimationFrame(function(){
    move(idxOffset(0),false);
    fill.style.width='0%';curEl.textContent='1';
    resetTimer();
  });});
}
if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
})();
</script>
</section>
